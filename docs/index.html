<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>哩程開票顧問</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}

/* Header */
header{background:linear-gradient(135deg,#161b22 0%,#1c2128 100%);border-bottom:1px solid #30363d;padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo h1{font-size:18px;font-weight:700;color:#e6edf3}
.logo p{font-size:12px;color:#6e7681;margin-top:1px}

/* Hero */
.hero{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1c2128 100%);padding:40px 40px 32px;max-width:1100px;margin:0 auto}
.hero h2{font-size:28px;font-weight:700;margin-bottom:8px}
.hero h2 span{background:linear-gradient(90deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:#6e7681;font-size:15px}

/* Tab nav */
main{max-width:1100px;margin:0 auto;padding:0 40px 40px}
.tab-nav{display:flex;gap:4px;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:11px 20px;border:none;border-radius:9px;font-size:14px;font-weight:500;cursor:pointer;background:transparent;color:#6e7681;transition:all .15s;text-align:center}
.tab-btn.active{background:linear-gradient(135deg,#1d2d50,#2d1b6e);color:#93c5fd;border:1px solid #3b82f6}
.tab-btn:hover:not(.active){color:#e6edf3}
.tab-pane{display:none}.tab-pane.active{display:block}

/* Card */
.card{background:#161b22;border:1px solid #30363d;border-radius:14px;padding:24px;margin-bottom:16px}
.card-title{font-size:13px;font-weight:600;color:#6e7681;letter-spacing:.06em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:#30363d}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;align-items:end}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;font-weight:500;color:#6e7681}
.field select,.field input{background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#e6edf3;font-size:15px;padding:11px 14px;outline:none;width:100%;appearance:none}
.field select:focus,.field input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.calc-btn{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;height:48px}
.calc-btn:hover{opacity:.9}

/* Cabin selector */
.cabin-selector{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.cabin-btn{background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#6e7681;padding:8px 16px;font-size:13px;cursor:pointer;transition:all .15s}
.cabin-btn.active{background:#1d2d50;border-color:#3b82f6;color:#93c5fd}

/* Results */
#result1,#result2{margin-top:20px}
.result-card{background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:20px;margin-bottom:10px;display:flex;align-items:flex-start;gap:16px;transition:border-color .15s}
.result-card.rank1{border-color:#22c55e;background:#0a1f0a}
.result-card.rank2{border-color:#3b82f6;background:#0a1520}
.result-card.rank3{border-color:#8b5cf6;background:#130a20}
.result-rank{font-size:26px;min-width:36px;text-align:center;padding-top:2px}
.result-body{flex:1}
.result-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.result-program{font-size:17px;font-weight:700;color:#e6edf3}
.result-alliance{font-size:11px;padding:2px 8px;border-radius:20px;background:#30363d;color:#6e7681}
.result-miles{font-size:28px;font-weight:800;color:#e6edf3;margin-bottom:4px}
.result-miles span{font-size:14px;color:#6e7681;font-weight:400;margin-left:4px}
.result-route{font-size:13px;color:#6e7681;margin-bottom:8px}
.result-value{font-size:13px}
.sweet-spots{margin-top:10px;border-top:1px solid #30363d;padding-top:10px}
.sweet-spot-item{font-size:12px;color:#6e7681;display:flex;gap:6px;margin-bottom:3px}
.sweet-spot-item::before{content:'💡';flex-shrink:0}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:500;white-space:nowrap}
.badge-best{background:#14532d;color:#4ade80}
.badge-value{background:#1e1b4b;color:#a5b4fc}
.no-result{text-align:center;color:#6e7681;padding:40px;font-size:14px}

/* Reverse calc */
.reverse-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:16px;align-items:end}
.result-routes{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.route-chip{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:6px 12px;font-size:13px;color:#c9d1d9}
.route-chip.highlight{border-color:#3b82f6;color:#93c5fd;background:#0a1520}

/* Airlines & connections in results */
.airlines-section{margin-top:12px;padding-top:12px;border-top:1px solid #21262d}
.section-label{font-size:11px;font-weight:600;color:#6e7681;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.airline-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.airline-chip{display:flex;align-items:center;gap:5px;background:#1c2128;border:1px solid #30363d;border-radius:6px;padding:4px 10px;font-size:12px;color:#c9d1d9}
.airline-chip.direct{border-color:#22c55e44;background:#0a1f0a}
.airline-chip .iata{font-size:10px;color:#6e7681;font-weight:600}
.airline-chip .direct-badge{font-size:10px;color:#4ade80}
.connection-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.connection-item{font-size:12px;color:#6e7681;display:flex;gap:6px;align-items:flex-start}
.connection-item::before{content:'🔀';flex-shrink:0;font-size:11px;margin-top:1px}
.booking-tip-box{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:10px 12px;font-size:12px;color:#8b949e;display:flex;gap:8px;align-items:flex-start}
.booking-tip-box::before{content:'💡';flex-shrink:0}
.booking-link{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;margin-top:10px}
.booking-link:hover{opacity:.85}

/* Program cards overview */
.programs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;margin-top:8px}
.prog-card{background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:18px}
.prog-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.prog-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.prog-name{font-size:15px;font-weight:600;color:#e6edf3}
.prog-airline{font-size:12px;color:#6e7681}
.prog-spots{margin-top:8px}
.prog-spot{font-size:12px;color:#6e7681;padding:4px 0;border-bottom:1px solid #21262d;display:flex;gap:6px}
.prog-spot:last-child{border-bottom:none}
.prog-spot::before{content:'⭐';flex-shrink:0}
.partners{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.partner-chip{font-size:11px;background:#1c2128;border:1px solid #30363d;border-radius:4px;padding:2px 8px;color:#8b949e}

@media(max-width:768px){
  header,main,.hero{padding-left:16px;padding-right:16px}
  .form-grid,.reverse-grid{grid-template-columns:1fr 1fr}
  .calc-btn{grid-column:1/-1}
  .programs-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✈️</div>
    <div>
      <h1>哩程開票顧問</h1>
      <p>找出最划算的哩程兌換方式</p>
    </div>
  </div>
</header>

<div class="hero">
  <h2>用哩程換機票，<span>哪個計畫最划算？</span></h2>
  <p>涵蓋寰宇一家、星空聯盟、天合聯盟主要哩程計畫，自動比較哩程需求與性價比</p>
</div>

<main>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('route',this)">🔍 開票試算（出發地 → 目的地）</button>
    <button class="tab-btn" onclick="switchTab('reverse',this)">🔄 反向試算（我有哩程，能換哪裡？）</button>
    <button class="tab-btn" onclick="switchTab('programs',this)">📋 計畫總覽</button>
  </div>

  <!-- Tab 1: 開票試算 -->
  <div id="tab-route" class="tab-pane active">
    <div class="card">
      <div class="card-title">✈️ 選擇航線與艙等</div>
      <div class="form-grid">
        <div class="field">
          <label>出發地</label>
          <select id="from-airport">
            <option value="">請選擇...</option>
          </select>
        </div>
        <div class="field">
          <label>目的地</label>
          <select id="to-airport">
            <option value="">請選擇...</option>
          </select>
        </div>
        <div class="field">
          <label>哩程計畫（可多選）</label>
          <select id="program-filter">
            <option value="all">全部計畫比較</option>
            <optgroup label="🐉 寰宇一家">
              <option value="asia_miles">亞洲萬里通（CX/KA）</option>
              <option value="jal_mileage">JAL 哩程銀行</option>
              <option value="ba_avios">英航 Executive Club（Avios）</option>
              <option value="malaysia_enrich">馬航 Enrich</option>
              <option value="qantas_ff">澳航 Qantas Frequent Flyer</option>
            </optgroup>
            <optgroup label="⭕ 星空聯盟">
              <option value="eva_mileage">長榮無限萬哩遊</option>
              <option value="ana_mileage">ANA 哩程俱樂部</option>
              <option value="krisflyer">新航 KrisFlyer</option>
              <option value="united_mileageplus">聯合航空 MileagePlus</option>
              <option value="miles_more">漢莎 Miles &amp; More</option>
              <option value="thai_rop">泰航 Royal Orchid Plus</option>
              <option value="turkish_miles">土耳其航空 Miles&amp;Smiles</option>
            </optgroup>
            <optgroup label="🌐 天合聯盟">
              <option value="dynasty_flyer">華航獎勵哩程</option>
              <option value="flying_blue">法荷航 Flying Blue</option>
              <option value="korean_skypass">大韓航空 SKYPASS</option>
            </optgroup>
            <optgroup label="✈️ 獨立航空">
              <option value="starlux">星宇 COSMILE</option>
              <option value="emirates_skywards">阿聯酋 Skywards</option>
            </optgroup>
          </select>
        </div>
        <button class="calc-btn" onclick="calcRoute()">試算 →</button>
      </div>
      <div class="cabin-selector">
        <span style="font-size:12px;color:#6e7681;align-self:center;margin-right:4px">艙等：</span>
        <button class="cabin-btn" data-cabin="eco" onclick="selectCabin(this)">🪑 經濟艙</button>
        <button class="cabin-btn active" data-cabin="biz" onclick="selectCabin(this)">💺 商務艙</button>
        <button class="cabin-btn" data-cabin="prem_eco" onclick="selectCabin(this)">🛋️ 豪華經濟</button>
        <button class="cabin-btn" data-cabin="first" onclick="selectCabin(this)">👑 頭等艙</button>
      </div>
    </div>
    <div id="result1"></div>
  </div>

  <!-- Tab 2: 反向試算 -->
  <div id="tab-reverse" class="tab-pane">
    <div class="card">
      <div class="card-title">🔄 我有多少哩程，能換什麼？</div>
      <div class="reverse-grid">
        <div class="field">
          <label>哩程計畫</label>
          <select id="rev-program">
            <optgroup label="🐉 寰宇一家">
              <option value="asia_miles">亞洲萬里通（CX/KA）</option>
              <option value="jal_mileage">JAL 哩程銀行</option>
              <option value="ba_avios">英航 Executive Club（Avios）</option>
              <option value="malaysia_enrich">馬航 Enrich</option>
              <option value="qantas_ff">澳航 Qantas Frequent Flyer</option>
            </optgroup>
            <optgroup label="⭕ 星空聯盟">
              <option value="eva_mileage">長榮無限萬哩遊</option>
              <option value="ana_mileage">ANA 哩程俱樂部</option>
              <option value="krisflyer">新航 KrisFlyer</option>
              <option value="united_mileageplus">聯合航空 MileagePlus</option>
              <option value="miles_more">漢莎 Miles &amp; More</option>
              <option value="thai_rop">泰航 Royal Orchid Plus</option>
              <option value="turkish_miles">土耳其航空 Miles&amp;Smiles</option>
            </optgroup>
            <optgroup label="🌐 天合聯盟">
              <option value="dynasty_flyer">華航獎勵哩程</option>
              <option value="flying_blue">法荷航 Flying Blue</option>
              <option value="korean_skypass">大韓航空 SKYPASS</option>
            </optgroup>
            <optgroup label="✈️ 獨立航空">
              <option value="starlux">星宇 COSMILE</option>
              <option value="emirates_skywards">阿聯酋 Skywards</option>
            </optgroup>
          </select>
        </div>
        <div class="field">
          <label>我有的哩程數</label>
          <input id="rev-miles" type="number" value="50000" min="1000" step="1000" placeholder="例：50000"/>
        </div>
        <div class="field">
          <label>出發地（選填）</label>
          <select id="rev-from">
            <option value="">全部航線</option>
          </select>
        </div>
        <button class="calc-btn" onclick="calcReverse()">查詢 →</button>
      </div>
      <div class="cabin-selector" style="margin-top:16px">
        <span style="font-size:12px;color:#6e7681;align-self:center;margin-right:4px">艙等：</span>
        <button class="cabin-btn rev-cabin" data-cabin="eco" onclick="selectRevCabin(this)">🪑 經濟艙</button>
        <button class="cabin-btn rev-cabin active" data-cabin="biz" onclick="selectRevCabin(this)">💺 商務艙</button>
        <button class="cabin-btn rev-cabin" data-cabin="prem_eco" onclick="selectRevCabin(this)">🛋️ 豪華經濟</button>
        <button class="cabin-btn rev-cabin" data-cabin="first" onclick="selectRevCabin(this)">👑 頭等艙</button>
      </div>
    </div>
    <div id="result2"></div>
  </div>

  <!-- Tab 3: 計畫總覽 -->
  <div id="tab-programs" class="tab-pane">
    <div class="card">
      <div class="card-title">📋 各大哩程計畫總覽</div>
      <div id="programs-grid" class="programs-grid"></div>
    </div>
  </div>
</main>

<script>
// ── 資料載入 ──────────────────────────────────────────────────────
var CHARTS = null;
var AIRPORTS = null;

Promise.all([
  fetch('data/award_charts.json').then(r=>r.json()),
  fetch('data/airports.json').then(r=>r.json())
]).then(function(data){
  CHARTS = data[0];
  AIRPORTS = data[1].airports;
  init();
}).catch(function(e){
  console.error('資料載入失敗',e);
  document.querySelector('main').innerHTML='<div style="text-align:center;padding:60px;color:#6e7681">資料載入中，請稍候...</div>';
});

function init(){
  // 填充機場選單：台灣優先，其餘按國家字母排序
  var airports = Object.entries(AIRPORTS).sort(function(a,b){
    var aTW = a[1].country==='台灣' ? 0 : 1;
    var bTW = b[1].country==='台灣' ? 0 : 1;
    if(aTW!==bTW) return aTW-bTW;
    return a[1].country.localeCompare(b[1].country,'zh-TW') || a[1].city.localeCompare(b[1].city,'zh-TW');
  });

  // 按國家分組（台灣包含 origin 機場）
  var groups = {};
  airports.forEach(function(e){
    var code=e[0], info=e[1];
    var c=info.country;
    if(!groups[c]) groups[c]=[];
    groups[c].push({code,info});
  });

  ['from-airport','to-airport','rev-from'].forEach(function(id){
    var sel=document.getElementById(id);
    Object.keys(groups).forEach(function(country){
      var og=document.createElement('optgroup');
      og.label=country;
      groups[country].forEach(function(a){
        var opt=new Option(a.info.city+' ('+a.code+')',a.code);
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
  });

  // 建立計畫總覽
  renderPrograms();
}

// ── Tab 切換 ──────────────────────────────────────────────────────
function switchTab(id,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── 艙等選擇 ──────────────────────────────────────────────────────
var selectedCabin='biz';
var selectedRevCabin='biz';

function selectCabin(btn){
  document.querySelectorAll('.cabin-btn:not(.rev-cabin)').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedCabin=btn.dataset.cabin;
}
function selectRevCabin(btn){
  document.querySelectorAll('.cabin-btn.rev-cabin').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  selectedRevCabin=btn.dataset.cabin;
}

// ── Tab1: 開票試算 ────────────────────────────────────────────────
function calcRoute(){
  var fromCode=document.getElementById('from-airport').value;
  var toCode=document.getElementById('to-airport').value;
  var filterProg=document.getElementById('program-filter').value;
  var cabin=selectedCabin;
  var el=document.getElementById('result1');

  if(!fromCode||!toCode){el.innerHTML='<div class="no-result">請選擇出發地和目的地</div>';return;}
  if(fromCode===toCode){el.innerHTML='<div class="no-result">出發地和目的地不能相同</div>';return;}

  var fromInfo=AIRPORTS[fromCode];
  var toInfo=AIRPORTS[toCode];
  if(!fromInfo||!toInfo){el.innerHTML='<div class="no-result">找不到機場資料</div>';return;}

  var cabinLabels={eco:'經濟艙',prem_eco:'豪華經濟艙',biz:'商務艙',first:'頭等艙'};
  var cabinIcons={eco:'🪑',prem_eco:'🛋️',biz:'💺',first:'👑'};
  var progIcons={asia_miles:'🐉',eva_mileage:'🟢',dynasty_flyer:'🔴',ana_mileage:'⭕',krisflyer:'🦁',starlux:'⭐',
    jal_mileage:'🔴',ba_avios:'🔵',flying_blue:'🌸',korean_skypass:'🔷',emirates_skywards:'🇦🇪',
    united_mileageplus:'🟡',miles_more:'✈️',thai_rop:'🌸',turkish_miles:'🌙',malaysia_enrich:'🦁',qantas_ff:'🦘'};
  var allianceColors={寰宇一家:'#dc7f27',星空聯盟:'#1a3a6b',天合聯盟:'#9b1c1c','獨立（無聯盟）':'#0891b2'};

  // 找每個計畫的哩程需求
  var results=[];
  Object.entries(CHARTS.programs).forEach(function(entry){
    var pid=entry[0], prog=entry[1];
    if(filterProg!=='all'&&filterProg!==pid) return;

    // zone 查詢：舊計畫用 airports.json 的 zone_xxx 欄位；新計畫用 prog.zones.airport_map
    var toZone;
    if(prog.zones&&prog.zones.airport_map){
      var am=prog.zones.airport_map;
      var fz=am[fromCode], tz=am[toCode];
      if(fz==='origin'&&tz==='origin'){return;}
      if(fz!=='origin'&&tz!=='origin'){return;}
      var destCode=fz==='origin'?toCode:fromCode;
      toZone=am[destCode];
      if(!toZone||toZone==='origin') return;
    } else {
      var zoneMap={asia_miles:'zone_asia_miles',eva_mileage:'zone_eva',dynasty_flyer:'zone_dynasty',ana_mileage:'zone_ana',krisflyer:'zone_krisflyer',starlux:'zone_starlux'};
      var zk=zoneMap[pid];
      if(!zk){return;}
      var fromIsOrigin=(fromInfo[zk]==='origin');
      var toIsOrigin=(toInfo[zk]==='origin');
      if(fromIsOrigin&&toIsOrigin){return;}
      if(!fromIsOrigin&&!toIsOrigin){return;}
      var destInfo=fromIsOrigin?toInfo:fromInfo;
      toZone=destInfo[zk];
      if(!toZone||toZone==='origin') return;
    }

    // 找對應 zone 的哩程數
    var zoneData=prog.zones.chart.find(function(z){return z.zone===toZone;});
    if(!zoneData) return;

    var miles=zoneData[cabin];
    if(!miles) return; // 該計畫無此艙等

    results.push({pid,prog,miles,zone:toZone,zoneData,zk,toZone});
  });

  if(!results.length){
    el.innerHTML='<div class="no-result">找不到可用的哩程計畫<br><span style="font-size:12px">可能原因：選擇的艙等（'+cabinLabels[cabin]+'）在這條航線上沒有資料</span></div>';
    return;
  }

  results.sort(function(a,b){return a.miles-b.miles;});

  var rankEmoji=['🥇','🥈','🥉','4️⃣','5️⃣'];
  var rankClass=['rank1','rank2','rank3','',''];

  var html='<div style="font-size:13px;color:#6e7681;margin-bottom:14px">'+
    fromInfo.city+' ('+fromCode+') → '+toInfo.city+' ('+toCode+') · '+cabinIcons[cabin]+' '+cabinLabels[cabin]+' · 共 '+results.length+' 個計畫</div>';

  results.forEach(function(r,i){
    var bestMark=i===0?'<span class="badge badge-best">最省哩程</span>':'';
    var saveVsBest=i>0?Math.round((r.miles-results[0].miles)/results[0].miles*100):'';
    var valueMark=saveVsBest?'<span class="badge" style="background:#1f2937;color:#9ca3af">多 '+saveVsBest+'%</span>':'';

    // ── 可搭乘航空 ──
    var airlinesHtml='';
    if(r.zoneData.airlines&&r.zoneData.airlines.length){
      var directList=r.zoneData.airlines.filter(function(a){return a.direct;});
      var connectList=r.zoneData.airlines.filter(function(a){return !a.direct;});
      var chips='';
      if(directList.length){
        chips+=directList.map(function(a){
          return '<span class="airline-chip direct"><span class="iata">'+a.code+'</span>'+a.name+'<span class="direct-badge">直飛</span></span>';
        }).join('');
      }
      if(connectList.length){
        chips+=connectList.map(function(a){
          return '<span class="airline-chip"><span class="iata">'+a.code+'</span>'+a.name+'</span>';
        }).join('');
      }
      airlinesHtml='<div class="airlines-section">'
        +'<div class="section-label">✈️ 可搭乘航空'
          +(directList.length?'　<span style="font-size:10px;color:#4ade80;font-weight:400">● 直飛</span>':'')
          +(connectList.length?'　<span style="font-size:10px;color:#6e7681;font-weight:400">○ 需轉機</span>':'')
        +'</div>'
        +'<div class="airline-list">'+chips+'</div>';

      // 轉機路線
      if(r.zoneData.connections&&r.zoneData.connections.length){
        airlinesHtml+='<div class="section-label" style="margin-top:6px">🔀 轉機路線</div>'
          +'<div class="connection-list">'
          +r.zoneData.connections.map(function(c){
            return '<div class="connection-item">'+c.tip+'</div>';
          }).join('')
          +'</div>';
      }

      // 常見航班路線示例
      var routeExamples=[];
      r.zoneData.airlines.slice(0,3).forEach(function(a){
        if(a.routes&&a.routes.length){
          routeExamples.push(a.code+': '+a.routes.slice(0,2).join('、'));
        }
      });
      if(routeExamples.length){
        airlinesHtml+='<div class="section-label" style="margin-top:6px">📍 典型航班</div>'
          +'<div style="font-size:12px;color:#6e7681;display:flex;flex-wrap:wrap;gap:6px">'
          +routeExamples.map(function(t){return '<span style="background:#1c2128;border:1px solid #30363d;border-radius:4px;padding:2px 8px">'+t+'</span>';}).join('')
          +'</div>';
      }

      // 開票建議
      if(r.zoneData.booking_tip){
        airlinesHtml+='<div class="booking-tip-box" style="margin-top:10px">'+r.zoneData.booking_tip+'</div>';
      }

      // 開票連結
      if(r.prog.booking_url){
        airlinesHtml+='<a class="booking-link" href="'+r.prog.booking_url+'" target="_blank" rel="noopener">前往開票 →</a>';
      }

      airlinesHtml+='</div>';
    }

    // 點數轉入夥伴
    var partnerHtml='';
    if(r.prog.transfer_partners&&r.prog.transfer_partners.length){
      partnerHtml='<div style="margin-top:8px;font-size:11px;color:#6e7681;display:flex;flex-wrap:wrap;gap:4px;align-items:center">'
        +'<span style="color:#4b5563">💳 可轉入：</span>'
        +r.prog.transfer_partners.map(function(p){return '<span class="partner-chip">'+p+'</span>';}).join('')
      +'</div>';
    }

    html+='<div class="result-card '+rankClass[i]+'">'
      +'<div class="result-rank">'+rankEmoji[i]+'</div>'
      +'<div class="result-body">'
        +'<div class="result-header">'
          +'<span class="result-program">'+progIcons[r.pid]+' '+r.prog.name+'</span>'
          +'<span class="result-alliance" style="background:'+(allianceColors[r.prog.alliance]||'#30363d')+'22;color:'+(allianceColors[r.prog.alliance]||'#6e7681')+'">'+r.prog.alliance+'</span>'
          +(r.pid==='starlux'?'<span class="badge" style="background:#0c4a6e22;color:#38bdf8;border:1px solid #0891b2">台灣本土</span>':'')
          +bestMark+valueMark
        +'</div>'
        +'<div class="result-miles">'+r.miles.toLocaleString()+'<span>哩（單程）</span></div>'
        +'<div style="color:#6e7681;font-size:13px;margin-bottom:6px">'+r.zoneData.label+'</div>'
        +airlinesHtml
        +partnerHtml
      +'</div>'
    +'</div>';
  });

  el.innerHTML=html;
}

// ── Tab2: 反向試算 ────────────────────────────────────────────────
function calcReverse(){
  var pid=document.getElementById('rev-program').value;
  var myMiles=parseInt(document.getElementById('rev-miles').value)||0;
  var fromCode=document.getElementById('rev-from').value;
  var cabin=selectedRevCabin;
  var el=document.getElementById('result2');

  if(!myMiles){el.innerHTML='<div class="no-result">請輸入哩程數量</div>';return;}

  var prog=CHARTS.programs[pid];
  if(!prog){el.innerHTML='<div class="no-result">計畫資料找不到</div>';return;}

  var cabinLabels={eco:'經濟艙',prem_eco:'豪華經濟艙',biz:'商務艙',first:'頭等艙'};
  var cabinIcons={eco:'🪑',prem_eco:'🛋️',biz:'💺',first:'👑'};

  // 找出可以兌換的 zones
  var canRedeem=[], cannotRedeem=[];
  prog.zones.chart.forEach(function(zoneData){
    var required=zoneData[cabin];
    if(!required){cannotRedeem.push({zoneData,reason:'此艙等不提供'});return;}
    if(myMiles>=required){canRedeem.push({zoneData,required,diff:myMiles-required});}
    else{cannotRedeem.push({zoneData,required,short:required-myMiles});}
  });

  if(!canRedeem.length){
    var minReq=prog.zones.chart.reduce(function(min,z){var r=z[cabin];return r&&r<min?r:min;},999999);
    el.innerHTML='<div class="no-result">'+myMiles.toLocaleString()+' 哩不足以兌換任何 '+cabinLabels[cabin]+'<br>'
      +'<span style="font-size:12px;color:#f87171">最低需要 '+minReq.toLocaleString()+' 哩，還差 '+(minReq-myMiles).toLocaleString()+' 哩</span></div>';
    return;
  }

  var html='<div style="font-size:13px;color:#6e7681;margin-bottom:14px">'
    +'<strong style="color:#e6edf3">'+prog.name+'</strong> · '
    +myMiles.toLocaleString()+' 哩 · '+cabinIcons[cabin]+' '+cabinLabels[cabin]
    +' · 可兌換 '+canRedeem.length+' 條航線</div>';

  html+='<div style="font-size:12px;font-weight:600;color:#22c55e;margin-bottom:10px;letter-spacing:.04em">✅ 可兌換的航線</div>';
  canRedeem.sort(function(a,b){return b.diff-a.diff;}).forEach(function(r){
    var pct=Math.round(r.diff/r.required*100);
    html+='<div class="result-card" style="border-color:#22c55e22">'
      +'<div style="font-size:22px;min-width:36px;text-align:center">✅</div>'
      +'<div style="flex:1">'
        +'<div style="font-size:15px;font-weight:600;color:#e6edf3;margin-bottom:4px">'+r.zoneData.label+'</div>'
        +'<div style="font-size:13px;color:#6e7681">需要 <strong style="color:#e6edf3">'+r.required.toLocaleString()+'</strong> 哩'
          +'　剩餘 <span style="color:#4ade80">'+r.diff.toLocaleString()+' 哩</span>'
          +(pct>30?'　<span class="badge badge-best">剩餘充足</span>':'')
        +'</div>'
      +'</div>'
    +'</div>';
  });

  if(cannotRedeem.filter(function(r){return r.required;}).length){
    html+='<div style="font-size:12px;font-weight:600;color:#6e7681;margin:16px 0 10px;letter-spacing:.04em">❌ 哩程不足的航線（差距）</div>';
    cannotRedeem.filter(function(r){return r.required;}).sort(function(a,b){return a.short-b.short;}).forEach(function(r){
      html+='<div style="background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:14px 16px;margin-bottom:6px;display:flex;gap:12px;align-items:center">'
        +'<div style="font-size:20px">❌</div>'
        +'<div style="flex:1">'
          +'<div style="font-size:14px;color:#6e7681;margin-bottom:3px">'+r.zoneData.label+'</div>'
          +'<div style="font-size:13px;color:#6e7681">需要 '+r.required.toLocaleString()+' 哩　<span style="color:#f87171">還差 '+r.short.toLocaleString()+' 哩</span></div>'
        +'</div>'
      +'</div>';
    });
  }

  el.innerHTML=html;
}

// ── Tab3: 計畫總覽 ────────────────────────────────────────────────
function renderPrograms(){
  if(!CHARTS) return;
  var progIcons={asia_miles:'🐉',eva_mileage:'🟢',dynasty_flyer:'🔴',ana_mileage:'⭕',krisflyer:'🦁',starlux:'⭐',
    jal_mileage:'🔴',ba_avios:'🔵',flying_blue:'🌸',korean_skypass:'🔷',emirates_skywards:'✈️',
    united_mileageplus:'🟡',miles_more:'✈️',thai_rop:'🌺',turkish_miles:'🌙',malaysia_enrich:'🦁',qantas_ff:'🦘'};
  var progColors={asia_miles:'#dc7f27',eva_mileage:'#16a34a',dynasty_flyer:'#dc2626',ana_mileage:'#6366f1',krisflyer:'#f59e0b',starlux:'#0891b2',
    jal_mileage:'#dc2626',ba_avios:'#1d4ed8',flying_blue:'#7c3aed',korean_skypass:'#2563eb',emirates_skywards:'#c2410c',
    united_mileageplus:'#ca8a04',miles_more:'#1a3a6b',thai_rop:'#9333ea',turkish_miles:'#dc2626',malaysia_enrich:'#b91c1c',qantas_ff:'#ea580c'};
  var html='';
  Object.entries(CHARTS.programs).forEach(function(entry){
    var pid=entry[0], prog=entry[1];
    var spotsHtml=prog.sweet_spots.map(function(s){return '<div class="prog-spot">'+s+'</div>';}).join('');
    var partnersHtml=prog.transfer_partners.length
      ?'<div style="margin-top:10px;font-size:11px;color:#6e7681">可轉入：</div><div class="partners">'+prog.transfer_partners.map(function(p){return '<span class="partner-chip">'+p+'</span>';}).join('')+'</div>'
      :'<div style="margin-top:8px;font-size:11px;color:#6e7681">暫無台灣常見信用卡轉入合作</div>';

    html+='<div class="prog-card">'
      +'<div class="prog-card-header">'
        +'<div class="prog-icon" style="background:'+(progColors[pid]||'#374151')+'22;border:1px solid '+(progColors[pid]||'#374151')+'44">'+progIcons[pid]+'</div>'
        +'<div><div class="prog-name">'+prog.name+'</div><div class="prog-airline">'+prog.airline+' · '+prog.alliance+'</div></div>'
      +'</div>'
      +'<div style="font-size:11px;font-weight:600;color:#6e7681;margin-bottom:6px">精選兌換亮點</div>'
      +'<div class="prog-spots">'+spotsHtml+'</div>'
      +partnersHtml
    +'</div>';
  });
  document.getElementById('programs-grid').innerHTML=html;
}
</script>
