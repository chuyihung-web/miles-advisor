<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>哩程開票顧問</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;font-size:16px;line-height:1.5}

/* Header */
header{background:linear-gradient(135deg,#161b22 0%,#1c2128 100%);border-bottom:1px solid #30363d;padding:18px 40px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo h1{font-size:20px;font-weight:700;color:#e6edf3}
.logo p{font-size:13px;color:#8b949e;margin-top:2px}

/* Hero */
.hero{background:linear-gradient(135deg,#0d1117 0%,#161b22 50%,#1c2128 100%);padding:44px 40px 36px;max-width:1100px;margin:0 auto}
.hero h2{font-size:32px;font-weight:800;margin-bottom:10px;letter-spacing:-.5px}
.hero h2 span{background:linear-gradient(90deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:#8b949e;font-size:16px}

/* Tab nav */
main{max-width:1100px;margin:0 auto;padding:0 40px 48px}
.tab-nav{display:flex;gap:4px;background:#161b22;border:1px solid #30363d;border-radius:14px;padding:5px;margin-bottom:28px}
.tab-btn{flex:1;padding:13px 20px;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;background:transparent;color:#8b949e;transition:all .15s;text-align:center}
.tab-btn.active{background:linear-gradient(135deg,#1d2d50,#2d1b6e);color:#93c5fd;border:1px solid #3b82f655;box-shadow:0 2px 8px rgba(59,130,246,.15)}
.tab-btn:hover:not(.active){color:#e6edf3;background:#1c2128}
.tab-pane{display:none}.tab-pane.active{display:block}

/* Card */
.card{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:28px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:600;color:#8b949e;letter-spacing:.05em;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.card-title::after{content:'';flex:1;height:1px;background:#30363d}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:18px;align-items:end}
.field{display:flex;flex-direction:column;gap:8px}
.field label{font-size:13px;font-weight:600;color:#8b949e;letter-spacing:.02em}
.field select,.field input{background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#e6edf3;font-size:15px;padding:13px 16px;outline:none;width:100%;appearance:none;transition:border-color .15s}
.field select:focus,.field input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.calc-btn{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:16px;font-weight:700;cursor:pointer;white-space:nowrap;height:52px;letter-spacing:.02em;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.calc-btn:hover{opacity:.9;box-shadow:0 6px 16px rgba(59,130,246,.4)}

/* Cabin selector */
.cabin-selector{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;align-items:center}
.cabin-selector>span{font-size:13px;color:#8b949e;font-weight:500;white-space:nowrap}
.cabin-btn{background:#0d1117;border:1px solid #30363d;border-radius:10px;color:#8b949e;padding:9px 18px;font-size:14px;cursor:pointer;transition:all .15s;font-weight:500}
.cabin-btn.active{background:#1d2d50;border-color:#3b82f6;color:#93c5fd;box-shadow:0 0 0 1px #3b82f655}
.cabin-btn:hover:not(.active){border-color:#484f58;color:#c9d1d9}

/* Results */
#result1,#result2{margin-top:24px}
.result-summary{font-size:14px;color:#8b949e;margin-bottom:16px;padding:0 4px;display:flex;align-items:center;gap:6px}
.result-card{background:#0d1117;border:1px solid #30363d;border-radius:14px;padding:22px 24px;margin-bottom:12px;display:flex;align-items:flex-start;gap:18px;transition:border-color .2s,box-shadow .2s}
.result-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.4)}
.result-card.rank1{border-color:#22c55e;background:#071510}
.result-card.rank2{border-color:#3b82f6;background:#071220}
.result-card.rank3{border-color:#8b5cf6;background:#0e0720}
.result-rank{font-size:28px;min-width:40px;text-align:center;padding-top:2px}
.result-body{flex:1;min-width:0}
.result-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.result-program{font-size:18px;font-weight:700;color:#e6edf3}
.result-alliance{font-size:12px;padding:3px 10px;border-radius:20px;background:#21262d;color:#8b949e;font-weight:500;border:1px solid #30363d}
.result-miles{font-size:30px;font-weight:800;color:#e6edf3;margin-bottom:6px;letter-spacing:-.5px}
.result-miles span{font-size:15px;color:#8b949e;font-weight:400;margin-left:6px}
.result-route{font-size:14px;color:#8b949e;margin-bottom:10px}
.result-value{font-size:14px}
.sweet-spots{margin-top:12px;border-top:1px solid #30363d;padding-top:12px}
.sweet-spot-item{font-size:13px;color:#8b949e;display:flex;gap:8px;margin-bottom:5px;line-height:1.5}
.sweet-spot-item::before{content:'💡';flex-shrink:0}
.badge{font-size:12px;padding:3px 10px;border-radius:6px;font-weight:600;white-space:nowrap}
.badge-best{background:#14532d;color:#4ade80;border:1px solid #166534}
.badge-value{background:#1e1b4b;color:#a5b4fc;border:1px solid #3730a3}
.no-result{text-align:center;color:#6e7681;padding:48px;font-size:15px}

/* Reverse calc */
.reverse-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:18px;align-items:end}
.result-routes{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.route-chip{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:7px 14px;font-size:14px;color:#c9d1d9}
.route-chip.highlight{border-color:#3b82f6;color:#93c5fd;background:#0a1520}

/* Airlines & connections in results */
.airlines-section{margin-top:14px;padding-top:14px;border-top:1px solid #21262d}
.section-label{font-size:12px;font-weight:600;color:#8b949e;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.airline-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.airline-chip{display:flex;align-items:center;gap:6px;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:6px 12px;font-size:13px;color:#c9d1d9}
.airline-chip.direct{border-color:#22c55e55;background:#071510}
.airline-chip .iata{font-size:11px;color:#8b949e;font-weight:700}
.airline-chip .direct-badge{font-size:11px;color:#4ade80}
.connection-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.connection-item{font-size:13px;color:#8b949e;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.connection-item::before{content:'🔀';flex-shrink:0;font-size:12px;margin-top:2px}
.dest-btn{display:inline-flex;align-items:center;gap:5px;background:#1c2128;border:1px solid #30363d;border-radius:8px;padding:5px 12px;font-size:13px;cursor:pointer;transition:all .15s;color:#c9d1d9;white-space:nowrap;font-weight:500}
.dest-btn:hover{background:#21262d;border-color:#58a6ff;color:#58a6ff}
.dest-btn.active{background:#0d2f6e;border-color:#1d4ed8;color:#93c5fd}
.dest-detail-panel{background:#0d1117;border:1px solid #30363d;border-radius:14px;padding:20px;margin-top:14px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.offorigin-box{background:#1a1200;border:1px solid #92400e;border-radius:10px;padding:14px 16px;margin-top:12px}
.offorigin-box .offorigin-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;font-weight:600;color:#fbbf24}
.offorigin-tip{border-top:1px solid #292100;padding-top:10px;margin-top:10px}
.offorigin-tip:first-child{border-top:none;padding-top:0;margin-top:0}
.offorigin-via{display:inline-flex;align-items:center;gap:4px;background:#292100;border:1px solid #78350f;border-radius:12px;padding:3px 12px;font-size:12px;font-weight:600;color:#fcd34d;margin-bottom:6px}
.benefit-badge{display:inline-block;border-radius:10px;padding:2px 9px;font-size:11px;font-weight:600;margin-left:5px}
.benefit-cheaper{background:#052e16;color:#4ade80;border:1px solid #166534}
.benefit-upgrade{background:#1e1b4b;color:#a5b4fc;border:1px solid #3730a3}
.benefit-availability{background:#1c1917;color:#a8a29e;border:1px solid #44403c}
.alliance-tip-box{background:#0d1b2a;border:1px solid #1d4ed855;border-radius:10px;padding:14px 16px;margin-top:12px}
.alliance-tip-box .section-label{color:#93c5fd}
.booking-tip-box{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:12px 16px;font-size:13px;color:#8b949e;display:flex;gap:10px;align-items:flex-start;line-height:1.6}
.booking-tip-box::before{content:'💡';flex-shrink:0}
.booking-link{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;margin-top:12px;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.booking-link:hover{opacity:.85}

/* Program cards overview */
.programs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-top:8px}
.prog-card{background:#0d1117;border:1px solid #30363d;border-radius:14px;padding:20px;transition:border-color .2s}
.prog-card:hover{border-color:#484f58}
.prog-card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.prog-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.prog-name{font-size:16px;font-weight:700;color:#e6edf3}
.prog-airline{font-size:13px;color:#8b949e;margin-top:1px}
.prog-spots{margin-top:10px}
.prog-spot{font-size:13px;color:#8b949e;padding:6px 0;border-bottom:1px solid #21262d;display:flex;gap:8px;line-height:1.5}
.prog-spot:last-child{border-bottom:none}
.prog-spot::before{content:'⭐';flex-shrink:0}
.partners{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.partner-chip{font-size:12px;background:#1c2128;border:1px solid #30363d;border-radius:6px;padding:3px 10px;color:#8b949e}

@media(max-width:768px){
  header,main,.hero{padding-left:16px;padding-right:16px}
  .form-grid,.reverse-grid{grid-template-columns:1fr 1fr}
  .calc-btn{grid-column:1/-1}
  .programs-grid{grid-template-columns:1fr}
  .hero h2{font-size:26px}
  .tab-btn{font-size:13px;padding:11px 12px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✈️</div>
    <div>
      <h1>哩程開票顧問</h1>
      <p>找出最划算的哩程兌換方式</p>
    </div>
  </div>
</header>

<div class="hero">
  <h2>用哩程換機票，<span>哪個計畫最划算？</span></h2>
  <p>涵蓋寰宇一家、星空聯盟、天合聯盟主要哩程計畫，自動比較哩程需求與性價比</p>
</div>

<main>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('route',this)">🔍 開票試算（出發地 → 目的地）</button>
    <button class="tab-btn" onclick="switchTab('reverse',this)">🔄 反向試算（我有哩程，能換哪裡？）</button>
    <button class="tab-btn" onclick="switchTab('programs',this)">📋 計畫總覽</button>
  </div>

  <!-- Tab 1: 開票試算 -->
  <div id="tab-route" class="tab-pane active">
    <div class="card">
      <div class="card-title">✈️ 選擇航線與艙等</div>
      <div class="form-grid">
        <div class="field">
          <label>出發地</label>
          <select id="from-airport">
            <option value="">請選擇...</option>
          </select>
        </div>
        <div class="field">
          <label>目的地</label>
          <select id="to-airport">
            <option value="">請選擇...</option>
          </select>
        </div>
        <div class="field">
          <label>哩程計畫（可多選）</label>
          <select id="program-filter">
            <option value="all">全部計畫比較</option>
            <optgroup label="🐉 寰宇一家">
              <option value="asia_miles">亞洲萬里通（CX/KA）</option>
              <option value="jal_mileage">JAL 哩程銀行</option>
              <option value="ba_avios">英航 Executive Club（Avios）</option>
              <option value="qatar_privilege">卡達航空 Privilege Club</option>
              <option value="alaska_mileage">阿拉斯加航空 Mileage Plan</option>
              <option value="malaysia_enrich">馬航 Enrich</option>
              <option value="qantas_ff">澳航 Qantas Frequent Flyer</option>
            </optgroup>
            <optgroup label="⭕ 星空聯盟">
              <option value="eva_mileage">長榮無限萬哩遊</option>
              <option value="ana_mileage">ANA 哩程俱樂部</option>
              <option value="krisflyer">新航 KrisFlyer</option>
              <option value="united_mileageplus">聯合航空 MileagePlus</option>
              <option value="aeroplan">加拿大航空 Aeroplan</option>
              <option value="miles_more">漢莎 Miles &amp; More</option>
              <option value="thai_rop">泰航 Royal Orchid Plus</option>
              <option value="turkish_miles">土耳其航空 Miles&amp;Smiles</option>
            </optgroup>
            <optgroup label="🌐 天合聯盟">
              <option value="dynasty_flyer">華航獎勵哩程</option>
              <option value="flying_blue">法荷航 Flying Blue</option>
              <option value="korean_skypass">大韓航空 SKYPASS</option>
            </optgroup>
            <optgroup label="✈️ 獨立航空">
              <option value="starlux">星宇 COSMILE</option>
              <option value="emirates_skywards">阿聯酋 Skywards</option>
              <option value="etihad_guest">阿提哈德 Etihad Guest</option>
            </optgroup>
          </select>
        </div>
        <button class="calc-btn" onclick="calcRoute()">試算 →</button>
      </div>
      <div class="cabin-selector">
        <span style="font-size:12px;color:#6e7681;align-self:center;margin-right:4px">艙等：</span>
        <button class="cabin-btn" data-cabin="eco" onclick="selectCabin(this)">🪑 經濟艙</button>
        <button class="cabin-btn active" data-cabin="biz" onclick="selectCabin(this)">💺 商務艙</button>
        <button class="cabin-btn" data-cabin="prem_eco" onclick="selectCabin(this)">🛋️ 豪華經濟</button>
        <button class="cabin-btn" data-cabin="first" onclick="selectCabin(this)">👑 頭等艙</button>
      </div>
    </div>
    <div id="result1"></div>
  </div>

  <!-- Tab 2: 反向試算 -->
  <div id="tab-reverse" class="tab-pane">
    <div class="card">
      <div class="card-title">🔄 我有多少哩程，能換什麼？</div>
      <div class="reverse-grid">
        <div class="field">
          <label>哩程計畫</label>
          <select id="rev-program">
            <optgroup label="🐉 寰宇一家">
              <option value="asia_miles">亞洲萬里通（CX/KA）</option>
              <option value="jal_mileage">JAL 哩程銀行</option>
              <option value="ba_avios">英航 Executive Club（Avios）</option>
              <option value="qatar_privilege">卡達航空 Privilege Club</option>
              <option value="alaska_mileage">阿拉斯加航空 Mileage Plan</option>
              <option value="malaysia_enrich">馬航 Enrich</option>
              <option value="qantas_ff">澳航 Qantas Frequent Flyer</option>
            </optgroup>
            <optgroup label="⭕ 星空聯盟">
              <option value="eva_mileage">長榮無限萬哩遊</option>
              <option value="ana_mileage">ANA 哩程俱樂部</option>
              <option value="krisflyer">新航 KrisFlyer</option>
              <option value="united_mileageplus">聯合航空 MileagePlus</option>
              <option value="aeroplan">加拿大航空 Aeroplan</option>
              <option value="miles_more">漢莎 Miles &amp; More</option>
              <option value="thai_rop">泰航 Royal Orchid Plus</option>
              <option value="turkish_miles">土耳其航空 Miles&amp;Smiles</option>
            </optgroup>
            <optgroup label="🌐 天合聯盟">
              <option value="dynasty_flyer">華航獎勵哩程</option>
              <option value="flying_blue">法荷航 Flying Blue</option>
              <option value="korean_skypass">大韓航空 SKYPASS</option>
            </optgroup>
            <optgroup label="✈️ 獨立航空">
              <option value="starlux">星宇 COSMILE</option>
              <option value="emirates_skywards">阿聯酋 Skywards</option>
              <option value="etihad_guest">阿提哈德 Etihad Guest</option>
            </optgroup>
          </select>
        </div>
        <div class="field">
          <label>我有的哩程數</label>
          <input id="rev-miles" type="number" value="50000" min="1000" step="1000" placeholder="例：50000"/>
        </div>
        <div class="field">
          <label>出發地（選填）</label>
          <select id="rev-from">
            <option value="">全部航線</option>
          </select>
        </div>
        <button class="calc-btn" onclick="calcReverse()">查詢 →</button>
      </div>
      <div style="font-size:11px;color:#4b5563;margin-top:10px;padding:6px 10px;background:#161b22;border-radius:6px">ℹ️ 自動顯示所有可達目的地，依最高可享艙等由高到低排列</div>
    </div>
    <div id="result2"></div>
  </div>

  <!-- Tab 3: 計畫總覽 -->
  <div id="tab-programs" class="tab-pane">
    <div class="card">
      <div class="card-title">📋 各大哩程計畫總覽</div>
      <div id="programs-grid" class="programs-grid"></div>
    </div>
  </div>
</main>

<script>
// ── 資料載入 ──────────────────────────────────────────────────────
var CHARTS = null;
var AIRPORTS = null;

Promise.all([
  fetch('data/award_charts.json').then(r=>r.json()),
  fetch('data/airports.json').then(r=>r.json())
]).then(function(data){
  CHARTS = data[0];
  AIRPORTS = data[1].airports;
  init();
}).catch(function(e){
  console.error('資料載入失敗',e);
  document.querySelector('main').innerHTML='<div style="text-align:center;padding:60px;color:#6e7681">資料載入中，請稍候...</div>';
});

function init(){
  // 國家 → 地區對照表（用於 optgroup 分組）
  var regionMap={
    '台灣':'🇹🇼 台灣',
    '日本':'🇯🇵 日本',
    '韓國':'🇰🇷 韓國',
    '香港':'🇭🇰 港澳','澳門':'🇭🇰 港澳',
    '中國':'🇨🇳 中國大陸',
    '泰國':'🌏 東南亞','越南':'🌏 東南亞','菲律賓':'🌏 東南亞',
    '馬來西亞':'🌏 東南亞','新加坡':'🌏 東南亞','印尼':'🌏 東南亞',
    '柬埔寨':'🌏 東南亞','緬甸':'🌏 東南亞','關島':'🌏 東南亞',
    '印度':'🌏 南亞','斯里蘭卡':'🌏 南亞','尼泊爾':'🌏 南亞','馬爾地夫':'🌏 南亞',
    '阿拉伯聯合大公國':'🌍 中東','卡達':'🌍 中東','沙烏地阿拉伯':'🌍 中東',
    '科威特':'🌍 中東','巴林':'🌍 中東','阿曼':'🌍 中東','約旦':'🌍 中東',
    '以色列':'🌍 中東','埃及':'🌍 中東','土耳其':'🌍 中東',
    '英國':'🌍 西歐','德國':'🌍 西歐','法國':'🌍 西歐','荷蘭':'🌍 西歐',
    '瑞士':'🌍 西歐','奧地利':'🌍 西歐','義大利':'🌍 西歐','西班牙':'🌍 西歐',
    '比利時':'🌍 西歐','挪威':'🌍 西歐','瑞典':'🌍 西歐','丹麥':'🌍 西歐',
    '芬蘭':'🌍 西歐','葡萄牙':'🌍 西歐','愛爾蘭':'🌍 西歐',
    '波蘭':'🌍 東歐','捷克':'🌍 東歐','匈牙利':'🌍 東歐','希臘':'🌍 東歐',
    '羅馬尼亞':'🌍 東歐','保加利亞':'🌍 東歐','塞爾維亞':'🌍 東歐',
    '克羅埃西亞':'🌍 東歐','斯洛維尼亞':'🌍 東歐','烏克蘭':'🌍 東歐',
    '立陶宛':'🌍 東歐','拉脫維亞':'🌍 東歐','愛沙尼亞':'🌍 東歐',
    '北馬其頓':'🌍 東歐','阿爾巴尼亞':'🌍 東歐',
    '肯亞':'🌍 非洲','南非':'🌍 非洲','摩洛哥':'🌍 非洲','衣索比亞':'🌍 非洲',
    '哈薩克':'🌏 中亞',
    '澳洲':'🌏 大洋洲','紐西蘭':'🌏 大洋洲','斐濟':'🌏 大洋洲',
    '美國':'🌎 北美洲','美國（夏威夷）':'🌎 北美洲','加拿大':'🌎 北美洲',
    '巴西':'🌎 南美洲','哥倫比亞':'🌎 南美洲','智利':'🌎 南美洲'
  };
  // 地區顯示順序
  var regionOrder=['🇹🇼 台灣','🇯🇵 日本','🇰🇷 韓國','🇭🇰 港澳','🇨🇳 中國大陸',
    '🌏 東南亞','🌏 南亞','🌍 中東','🌍 西歐','🌍 東歐','🌍 非洲',
    '🌏 中亞','🌏 大洋洲','🌎 北美洲','🌎 南美洲'];

  var airports = Object.entries(AIRPORTS).sort(function(a,b){
    var ra=regionMap[a[1].country]||'🌍 其他';
    var rb=regionMap[b[1].country]||'🌍 其他';
    var oa=regionOrder.indexOf(ra); if(oa<0) oa=99;
    var ob=regionOrder.indexOf(rb); if(ob<0) ob=99;
    if(oa!==ob) return oa-ob;
    return a[1].country.localeCompare(b[1].country,'zh-TW') || a[1].city.localeCompare(b[1].city,'zh-TW');
  });

  // 按地區分組
  var groups = {};
  var groupOrder = [];
  airports.forEach(function(e){
    var code=e[0], info=e[1];
    var region=regionMap[info.country]||'🌍 其他';
    if(!groups[region]){ groups[region]=[]; groupOrder.push(region); }
    groups[region].push({code,info});
  });

  ['from-airport','to-airport','rev-from'].forEach(function(id){
    var sel=document.getElementById(id);
    groupOrder.forEach(function(region){
      var og=document.createElement('optgroup');
      og.label=region;
      groups[region].forEach(function(a){
        var opt=new Option(a.info.city+' ('+a.code+')',a.code);
        og.appendChild(opt);
      });
      sel.appendChild(og);
    });
  });

  // 建立計畫總覽
  renderPrograms();
}

// ── Tab1: 開票試算 ────────────────────────────────────────────────
function calcRoute(){
  var fromCode=document.getElementById('from-airport').value;
  var toCode=document.getElementById('to-airport').value;
  var filterProg=document.getElementById('program-filter').value;
  var cabin=selectedCabin;
  var el=document.getElementById('result1');

  if(!fromCode||!toCode){el.innerHTML='<div class="no-result">請選擇出發地和目的地</div>';return;}
  if(fromCode===toCode){el.innerHTML='<div class="no-result">出發地和目的地不能相同</div>';return;}

  var fromInfo=AIRPORTS[fromCode];
  var toInfo=AIRPORTS[toCode];
  if(!fromInfo||!toInfo){el.innerHTML='<div class="no-result">找不到機場資料</div>';return;}

  var cabinLabels={eco:'經濟艙',prem_eco:'豪華經濟艙',biz:'商務艙',first:'頭等艙'};
  var cabinIcons={eco:'🪑',prem_eco:'🛋️',biz:'💺',first:'👑'};
  var progIcons={asia_miles:'🐉',eva_mileage:'🟢',dynasty_flyer:'🔴',ana_mileage:'⭕',krisflyer:'🦁',starlux:'⭐',
    jal_mileage:'🔴',ba_avios:'🔵',flying_blue:'🌸',korean_skypass:'🔷',emirates_skywards:'🇦🇪',
    united_mileageplus:'🟡',miles_more:'✈️',thai_rop:'🌸',turkish_miles:'🌙',malaysia_enrich:'🦁',qantas_ff:'🦘',
    qatar_privilege:'🟣',aeroplan:'🍁',etihad_guest:'💎',alaska_mileage:'🦅'};
  var allianceColors={寰宇一家:'#dc7f27',星空聯盟:'#1a3a6b',天合聯盟:'#9b1c1c','獨立（無聯盟）':'#0891b2'};

  // 找每個計畫的哩程需求
  var results=[];
  Object.entries(CHARTS.programs).forEach(function(entry){
    var pid=entry[0], prog=entry[1];
    if(filterProg!=='all'&&filterProg!==pid) return;

    // zone 查詢：舊計畫用 airports.json 的 zone_xxx 欄位；新計畫用 prog.zones.airport_map
    var toZone;
    if(prog.zones&&prog.zones.airport_map){
      var am=prog.zones.airport_map;
      var fz=am[fromCode], tz=am[toCode];
      if(fz==='origin'&&tz==='origin'){return;}
      if(fz!=='origin'&&tz!=='origin'){return;}
      var destCode=fz==='origin'?toCode:fromCode;
      toZone=am[destCode];
      if(!toZone||toZone==='origin') return;
    } else {
      var zoneMap={asia_miles:'zone_asia_miles',eva_mileage:'zone_eva',dynasty_flyer:'zone_dynasty',ana_mileage:'zone_ana',krisflyer:'zone_krisflyer',starlux:'zone_starlux'};
      var zk=zoneMap[pid];
      if(!zk){return;}
      var fromIsOrigin=(fromInfo[zk]==='origin');
      var toIsOrigin=(toInfo[zk]==='origin');
      if(fromIsOrigin&&toIsOrigin){return;}
      if(!fromIsOrigin&&!toIsOrigin){return;}
      var destInfo=fromIsOrigin?toInfo:fromInfo;
      toZone=destInfo[zk];
      if(!toZone||toZone==='origin') return;
    }

    // 找對應 zone 的哩程數
    var zoneData=prog.zones.chart.find(function(z){return z.zone===toZone;});
    if(!zoneData) return;

    var miles=zoneData[cabin];
    if(!miles) return; // 該計畫無此艙等

    // 同時收集各艙等哩程（供聯盟升等建議用）
    var allCabins={eco:zoneData.eco,prem_eco:zoneData.prem_eco,biz:zoneData.biz,first:zoneData.first};
    results.push({pid,prog,miles,zone:toZone,zoneData,allCabins});
  });

  if(!results.length){
    el.innerHTML='<div class="no-result">找不到可用的哩程計畫<br><span style="font-size:12px">可能原因：選擇的艙等（'+cabinLabels[cabin]+'）在這條航線上沒有資料</span></div>';
    return;
  }

  results.sort(function(a,b){return a.miles-b.miles;});

  var rankEmoji=['🥇','🥈','🥉','4️⃣','5️⃣'];
  var rankClass=['rank1','rank2','rank3','',''];

  var html='<div style="font-size:13px;color:#6e7681;margin-bottom:14px">'+
    fromInfo.city+' ('+fromCode+') → '+toInfo.city+' ('+toCode+') · '+cabinIcons[cabin]+' '+cabinLabels[cabin]+' · 共 '+results.length+' 個計畫</div>';

  results.forEach(function(r,i){
    var bestMark=i===0?'<span class="badge badge-best">最省哩程</span>':'';
    var saveVsBest=i>0?Math.round((r.miles-results[0].miles)/results[0].miles*100):'';
    var valueMark=saveVsBest?'<span class="badge" style="background:#1f2937;color:#9ca3af">多 '+saveVsBest+'%</span>':'';

    // ── 可搭乘航空 ──
    var airlinesHtml='';
    if(r.zoneData.airlines&&r.zoneData.airlines.length){
      var directList=r.zoneData.airlines.filter(function(a){return a.direct;});
      var connectList=r.zoneData.airlines.filter(function(a){return !a.direct;});
      var chips='';
      if(directList.length){
        chips+=directList.map(function(a){
          return '<span class="airline-chip direct"><span class="iata">'+a.code+'</span>'+a.name+'<span class="direct-badge">直飛</span></span>';
        }).join('');
      }
      if(connectList.length){
        chips+=connectList.map(function(a){
          return '<span class="airline-chip"><span class="iata">'+a.code+'</span>'+a.name+'</span>';
        }).join('');
      }
      airlinesHtml='<div class="airlines-section">'
        +'<div class="section-label">✈️ 可搭乘航空'
          +(directList.length?'　<span style="font-size:10px;color:#4ade80;font-weight:400">● 直飛</span>':'')
          +(connectList.length?'　<span style="font-size:10px;color:#6e7681;font-weight:400">○ 需轉機</span>':'')
        +'</div>'
        +'<div class="airline-list">'+chips+'</div>';

      // 轉機路線
      if(r.zoneData.connections&&r.zoneData.connections.length){
        airlinesHtml+='<div class="section-label" style="margin-top:6px">🔀 轉機路線</div>'
          +'<div class="connection-list">'
          +r.zoneData.connections.map(function(c){
            return '<div class="connection-item">'+c.tip+'</div>';
          }).join('')
          +'</div>';
      }

      // 常見航班路線示例
      var routeExamples=[];
      r.zoneData.airlines.slice(0,3).forEach(function(a){
        if(a.routes&&a.routes.length){
          routeExamples.push(a.code+': '+a.routes.slice(0,2).join('、'));
        }
      });
      if(routeExamples.length){
        airlinesHtml+='<div class="section-label" style="margin-top:6px">📍 典型航班</div>'
          +'<div style="font-size:12px;color:#6e7681;display:flex;flex-wrap:wrap;gap:6px">'
          +routeExamples.map(function(t){return '<span style="background:#1c2128;border:1px solid #30363d;border-radius:4px;padding:2px 8px">'+t+'</span>';}).join('')
          +'</div>';
      }

      // 開票建議
      if(r.zoneData.booking_tip){
        airlinesHtml+='<div class="booking-tip-box" style="margin-top:10px">'+r.zoneData.booking_tip+'</div>';
      }

      // 開票連結
      if(r.prog.booking_url){
        airlinesHtml+='<a class="booking-link" href="'+r.prog.booking_url+'" target="_blank" rel="noopener">前往開票 →</a>';
      }

      airlinesHtml+='</div>';
    }

    // 點數轉入夥伴
    var partnerHtml='';
    if(r.prog.transfer_partners&&r.prog.transfer_partners.length){
      partnerHtml='<div style="margin-top:8px;font-size:11px;color:#6e7681;display:flex;flex-wrap:wrap;gap:4px;align-items:center">'
        +'<span style="color:#4b5563">💳 可轉入：</span>'
        +r.prog.transfer_partners.map(function(p){return '<span class="partner-chip">'+p+'</span>';}).join('')
      +'</div>';
    }

    // ── 同聯盟比較（升等 / 換計畫更划算） ──
    var allianceHtml='';
    if(filterProg==='all'){
      var sameAlliance=results.filter(function(x){return x.prog.alliance===r.prog.alliance&&x.pid!==r.pid;});
      if(sameAlliance.length){
        var cabinOrder=['eco','prem_eco','biz','first'];
        var cabinLabel2={eco:'經濟艙',prem_eco:'豪華經濟',biz:'商務艙',first:'頭等艙'};
        var tips=[];

        sameAlliance.forEach(function(x){
          var savePct=Math.round((r.miles-x.miles)/r.miles*100);
          if(x.miles<r.miles){
            tips.push('<span style="color:#4ade80">↓ 省'+savePct+'%</span> 改用 <b>'+x.prog.name+'</b> 只需 '+x.miles.toLocaleString()+' 哩');
          }
          // 同計畫升等提示：目前選的艙等，同聯盟其他計畫有無更高艙等且哩程合理
          var curIdx=cabinOrder.indexOf(cabin);
          if(curIdx>=0){
            var higherCabins=cabinOrder.slice(curIdx+1);
            higherCabins.forEach(function(hc){
              if(x.allCabins[hc]){
                var ratio=x.allCabins[hc]/r.miles;
                if(ratio<=2.2){
                  tips.push('升等選項：<b>'+x.prog.name+'</b> 的 '+cabinLabel2[hc]+' 只需 '+x.allCabins[hc].toLocaleString()+' 哩（貴'+Math.round((ratio-1)*100)+'%，但升艙）');
                }
              }
            });
          }
          // 當前選的艙等此計畫沒有，但同聯盟另一計畫有
          if(!r.allCabins[cabin]&&x.allCabins[cabin]){
            tips.push('<b>'+x.prog.name+'</b> 可開 '+cabinLabel2[cabin]+'（'+x.allCabins[cabin].toLocaleString()+' 哩），'+r.prog.name+' 此艙等無資料');
          }
        });

        // 去重
        tips=tips.filter(function(v,idx,a){return a.indexOf(v)===idx;}).slice(0,3);

        if(tips.length){
          allianceHtml='<div class="alliance-tip-box">'
            +'<div class="section-label" style="margin-bottom:6px">🔄 同聯盟比較建議</div>'
            +tips.map(function(t){return '<div style="font-size:12px;color:#c9d1d9;margin-bottom:4px">• '+t+'</div>';}).join('')
            +'</div>';
        }
      }
    }

    // ── 外站開票建議 ──
    var offoriginHtml='';
    if(r.prog.offorigin_tips&&r.prog.offorigin_tips.length){
      var matchTips=r.prog.offorigin_tips.filter(function(t){
        return t.apply_zones&&t.apply_zones.indexOf(r.zone)>=0;
      });
      if(matchTips.length){
        var benefitLabel={cheaper:'省哩程',upgrade:'升等機會',availability:'更易取位'};
        var benefitClass={cheaper:'benefit-cheaper',upgrade:'benefit-upgrade',availability:'benefit-availability'};
        offoriginHtml='<div class="offorigin-box">'
          +'<div class="offorigin-header">🌏 外站開票建議 <span style="font-weight:400;color:#78350f;font-size:11px">（先飛定位城市，再開長程票）</span></div>'
          +matchTips.map(function(t){
            var saveTxt=t.miles_delta&&t.miles_delta<0?'<b style="color:#4ade80">省約 '+Math.abs(t.miles_delta/1000).toFixed(0)+',000 哩</b>':'';
            return '<div class="offorigin-tip">'
              +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px">'
                +'<span class="offorigin-via">'+t.flag+' 定位至 '+t.via_name+'（'+t.via+'）</span>'
                +'<span class="benefit-badge '+benefitClass[t.benefit]+'">'+benefitLabel[t.benefit]+'</span>'
                +(saveTxt?' '+saveTxt:'')
              +'</div>'
              +'<div style="font-size:12px;color:#d97706;margin-bottom:4px">✈️ 定位成本：'+t.positioning_est+'</div>'
              +'<div style="font-size:12px;color:#c9d1d9;line-height:1.6">'+t.tip+'</div>'
            +'</div>';
          }).join('')
          +'</div>';
      }
    }

    html+='<div class="result-card '+rankClass[i]+'">'
      +'<div class="result-rank">'+rankEmoji[i]+'</div>'
      +'<div class="result-body">'
        +'<div class="result-header">'
          +'<span class="result-program">'+progIcons[r.pid]+' '+r.prog.name+'</span>'
          +'<span class="result-alliance" style="background:'+(allianceColors[r.prog.alliance]||'#30363d')+'22;color:'+(allianceColors[r.prog.alliance]||'#6e7681')+'">'+r.prog.alliance+'</span>'
          +(r.pid==='starlux'?'<span class="badge" style="background:#0c4a6e22;color:#38bdf8;border:1px solid #0891b2">台灣本土</span>':'')
          +bestMark+valueMark
        +'</div>'
        +'<div class="result-miles">'+r.miles.toLocaleString()+'<span>哩（單程）</span></div>'
        +'<div style="color:#6e7681;font-size:13px;margin-bottom:6px">'+r.zoneData.label+'</div>'
        +airlinesHtml
        +partnerHtml
        +allianceHtml
        +offoriginHtml
      +'</div>'
    +'</div>';
  });

  el.innerHTML=html;
}

// ── Tab2: 反向試算 ────────────────────────────────────────────────
function calcReverse(){
  var pid=document.getElementById('rev-program').value;
  var myMiles=parseInt(document.getElementById('rev-miles').value)||0;
  var fromCode=document.getElementById('rev-from').value;  // 目前保留，預設台灣出發
  var el=document.getElementById('result2');

  if(!myMiles){el.innerHTML='<div class="no-result">請輸入哩程數量</div>';return;}
  try {

  var prog=CHARTS.programs[pid];
  if(!prog){el.innerHTML='<div class="no-result">計畫資料找不到</div>';return;}

  var cabinOrder=['first','biz','prem_eco','eco'];
  var cabinLabels={eco:'經濟艙',prem_eco:'豪華經濟艙',biz:'商務艙',first:'頭等艙'};
  var cabinIcons={eco:'🪑',prem_eco:'🛋️',biz:'💺',first:'👑'};
  var cabinColors={first:'#b45309',biz:'#1d4ed8',prem_eco:'#6d28d9',eco:'#374151'};
  var cabinBorders={first:'#92400e',biz:'#1e40af',prem_eco:'#5b21b6',eco:'#30363d'};

  // 取得各 zone 的機場清單（airport_map 或 zone_xxx 欄位）
  function getAirportsInZone(zone){
    var list=[];
    if(prog.zones&&prog.zones.airport_map){
      Object.entries(prog.zones.airport_map).forEach(function(e){
        if(e[1]===zone&&AIRPORTS[e[0]]){
          list.push({code:e[0],info:AIRPORTS[e[0]]});
        }
      });
    } else {
      var zk={asia_miles:'zone_asia_miles',eva_mileage:'zone_eva',dynasty_flyer:'zone_dynasty',
              ana_mileage:'zone_ana',krisflyer:'zone_krisflyer',starlux:'zone_starlux'}[pid];
      if(zk){
        Object.entries(AIRPORTS).forEach(function(e){
          if(e[1][zk]===zone) list.push({code:e[0],info:e[1]});
        });
      }
    }
    // 按國家/城市排序
    list.sort(function(a,b){return a.info.country.localeCompare(b.info.country,'zh-TW')||a.info.city.localeCompare(b.info.city,'zh-TW');});
    return list;
  }

  // 對每個 zone，找出用戶可達到的最高艙等
  var results=[];  // {zoneData, bestCabin, milesNeeded, airports}
  prog.zones.chart.forEach(function(zoneData){
    var bestCabin=null, milesNeeded=null;
    for(var i=0;i<cabinOrder.length;i++){
      var c=cabinOrder[i];
      if(zoneData[c]&&myMiles>=zoneData[c]){
        bestCabin=c; milesNeeded=zoneData[c]; break;
      }
    }
    // 找最近一個差距（不足時）
    var nearestCabin=null, nearestMiles=null, shortfall=null;
    for(var j=cabinOrder.length-1;j>=0;j--){
      var cc=cabinOrder[j];
      if(zoneData[cc]){
        if(!bestCabin){nearestCabin=cc;nearestMiles=zoneData[cc];shortfall=zoneData[cc]-myMiles;}
        break;
      }
    }
    var airports=bestCabin?getAirportsInZone(zoneData.zone):[];
    results.push({zoneData,bestCabin,milesNeeded,airports,nearestCabin,nearestMiles,shortfall});
  });

  var reachable=results.filter(function(r){return r.bestCabin;});
  var unreachable=results.filter(function(r){return !r.bestCabin&&r.nearestMiles;});

  if(!reachable.length){
    var cheapest=Math.min.apply(null,prog.zones.chart.map(function(z){return z.eco||z.prem_eco||z.biz||z.first||999999;}));
    el.innerHTML='<div class="no-result">'+myMiles.toLocaleString()+' 哩目前無法兌換任何航線<br>'
      +'<span style="font-size:12px;color:#f87171">最低需要 '+cheapest.toLocaleString()+' 哩（還差 '+(cheapest-myMiles).toLocaleString()+' 哩）</span></div>';
    return;
  }

  // 排序：最高艙等優先，同艙等按哩程從少到多
  var cabinRank={first:0,biz:1,prem_eco:2,eco:3};
  reachable.sort(function(a,b){
    var cr=cabinRank[a.bestCabin]-cabinRank[b.bestCabin];
    if(cr!==0) return cr;
    return a.milesNeeded-b.milesNeeded;
  });

  // 統計
  var firstCount=reachable.filter(function(r){return r.bestCabin==='first';}).length;
  var bizCount=reachable.filter(function(r){return r.bestCabin==='biz';}).length;
  var peCount=reachable.filter(function(r){return r.bestCabin==='prem_eco';}).length;
  var ecoCount=reachable.filter(function(r){return r.bestCabin==='eco';}).length;
  var totalAirports=reachable.reduce(function(s,r){return s+r.airports.length;},0);

  var html='<div style="margin-bottom:16px">'
    +'<div style="font-size:14px;color:#e6edf3;font-weight:600;margin-bottom:8px">'
      +'<strong>'+prog.name+'</strong>　'+myMiles.toLocaleString()+' 哩可達 <strong style="color:#4ade80">'+totalAirports+'</strong> 個城市</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:8px;font-size:12px">'
      +(firstCount?'<span style="background:#78350f44;border:1px solid #92400e;border-radius:12px;padding:3px 12px;color:#fbbf24">👑 頭等艙 '+firstCount+' 條航線</span>':'')
      +(bizCount?'<span style="background:#1e3a8a44;border:1px solid #1e40af;border-radius:12px;padding:3px 12px;color:#93c5fd">💺 商務艙 '+bizCount+' 條航線</span>':'')
      +(peCount?'<span style="background:#4c1d9544;border:1px solid #5b21b6;border-radius:12px;padding:3px 12px;color:#c4b5fd">🛋️ 豪華經濟 '+peCount+' 條航線</span>':'')
      +(ecoCount?'<span style="background:#1f293744;border:1px solid #374151;border-radius:12px;padding:3px 12px;color:#9ca3af">🪑 經濟艙 '+ecoCount+' 條航線</span>':'')
    +'</div>'
  +'</div>';

  // 可達航線
  var lastCabin=null;
  reachable.forEach(function(r){
    if(r.bestCabin!==lastCabin){
      lastCabin=r.bestCabin;
      html+='<div style="font-size:12px;font-weight:700;color:'+(cabinColors[r.bestCabin]||'#6e7681')+';margin:16px 0 8px;letter-spacing:.05em;border-bottom:1px solid '+(cabinBorders[r.bestCabin]||'#30363d')+';padding-bottom:6px">'
        +cabinIcons[r.bestCabin]+' '+cabinLabels[r.bestCabin]+'　可達以下目的地'
      +'</div>';
    }
    var diff=myMiles-r.milesNeeded;
    var diffPct=Math.round(diff/r.milesNeeded*100);
    // 直飛航空
    var directAirlines=r.zoneData.airlines?r.zoneData.airlines.filter(function(a){return a.direct;}).map(function(a){return a.code+' '+a.name;}).join('、'):'';
    // 城市清單 → 可點擊按鈕
    var zoneKey='zone_'+r.zoneData.zone+'_'+pid;
    window._revZones=window._revZones||{};
    window._revZones[zoneKey]={zoneData:r.zoneData,bestCabin:r.bestCabin,milesNeeded:r.milesNeeded,prog:prog,pid:pid,myMiles:myMiles};
    var cityChips=r.airports.map(function(a){
      return '<button class="dest-btn" data-zk="'+zoneKey+'" data-ac="'+a.code+'" onclick="showDestDetail(this.dataset.zk,this.dataset.ac,this)">'
        +a.info.city+'<span style="color:#4b5563;margin-left:3px">'+a.code+'</span>'
        +'</button>';
    }).join(' ');

    html+='<div class="result-card" style="border-color:'+(cabinBorders[r.bestCabin]||'#30363d')+'44;margin-bottom:8px">'
      +'<div style="min-width:36px;text-align:center;font-size:20px">'+cabinIcons[r.bestCabin]+'</div>'
      +'<div style="flex:1;min-width:0">'
        +'<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px">'
          +'<span style="font-size:14px;font-weight:600;color:#e6edf3">'+r.zoneData.label+'</span>'
          +'<span style="font-size:12px;color:#e6edf3;background:'+(cabinColors[r.bestCabin]||'#1f2937')+'33;border:1px solid '+(cabinBorders[r.bestCabin]||'#374151')+';border-radius:10px;padding:1px 8px">'+r.milesNeeded.toLocaleString()+' 哩</span>'
          +(diff>0?'<span style="font-size:11px;color:#4ade80">剩 '+diff.toLocaleString()+' 哩'+(diffPct>50?' ✦':'')+'</span>':'')
        +'</div>'
        // 可升等提示
        +(function(){
          var upgradeTip='';
          for(var i=0;i<cabinOrder.indexOf(r.bestCabin);i++){
            var hc=cabinOrder[i];
            if(r.zoneData[hc]){
              upgradeTip='<div style="font-size:11px;color:#fbbf24;margin-bottom:6px">↑ 再加 '+(r.zoneData[hc]-myMiles).toLocaleString()+' 哩可升至 '+cabinLabels[hc]+'（需 '+r.zoneData[hc].toLocaleString()+' 哩）</div>';
              break;
            }
          }
          return upgradeTip;
        })()
        // 城市列表
        +(cityChips?'<div style="font-size:11px;color:#4b5563;margin-bottom:4px">👆 點選城市查看開票建議</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">'+cityChips+'</div><div id="detail-'+zoneKey+'" class="dest-detail-panel" style="display:none"></div>':'')
        // 直飛航空
        +(directAirlines?'<div style="font-size:11px;color:#6e7681">✈️ 直飛：'+directAirlines+'</div>':'')
        // 開票提示
        +(r.zoneData.booking_tip?'<div style="font-size:11px;color:#9ca3af;margin-top:4px;border-top:1px solid #21262d;padding-top:4px">'+r.zoneData.booking_tip+'</div>':'')
      +'</div>'
    +'</div>';
  });

  // 不足的航線（差距最近的）
  if(unreachable.length){
    var sorted=unreachable.slice().sort(function(a,b){return a.shortfall-b.shortfall;});
    html+='<div style="font-size:12px;font-weight:600;color:#6e7681;margin:20px 0 8px;border-top:1px solid #21262d;padding-top:16px">哩程不足（再累積多一點就能到）</div>';
    sorted.slice(0,4).forEach(function(r){
      html+='<div style="background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;gap:10px;align-items:center">'
        +'<div style="font-size:18px;opacity:.5">'+cabinIcons[r.nearestCabin]+'</div>'
        +'<div style="flex:1">'
          +'<span style="font-size:13px;color:#6e7681">'+r.zoneData.label+'</span>'
          +'<span style="font-size:12px;color:#f87171;margin-left:8px">還差 '+r.shortfall.toLocaleString()+' 哩</span>'
          +'<span style="font-size:11px;color:#4b5563;margin-left:6px">（'+cabinLabels[r.nearestCabin]+' 需 '+r.nearestMiles.toLocaleString()+' 哩）</span>'
        +'</div>'
      +'</div>';
    });
  }

  el.innerHTML=html;
  window._revZones=window._revZones||{};
  } catch(e) {
    el.innerHTML='<div style="color:#f87171;padding:16px;background:#1a0000;border-radius:8px;font-size:12px"><b>錯誤：</b>'+e.message+'<br><pre style="margin-top:8px;font-size:10px;white-space:pre-wrap">'+e.stack+'</pre></div>';
  }
}

function showDestDetail(zoneKey, airportCode, btn){
  var data=window._revZones&&window._revZones[zoneKey];
  if(!data) return;

  // toggle active
  var panel=document.getElementById('detail-'+zoneKey);
  var allBtns=panel.parentElement.querySelectorAll('.dest-btn');
  allBtns.forEach(function(b){b.classList.remove('active');});

  if(panel.style.display!=='none'&&panel.dataset.airport===airportCode){
    panel.style.display='none'; return;
  }
  btn.classList.add('active');
  panel.dataset.airport=airportCode;
  panel.style.display='block';

  var ap=AIRPORTS[airportCode];
  var zd=data.zoneData;
  var prog=data.prog;
  var cabinLabels={eco:'經濟艙',prem_eco:'豪華經濟艙',biz:'商務艙',first:'頭等艙'};
  var cabinIcons={eco:'🪑',prem_eco:'🛋️',biz:'💺',first:'👑'};
  var cabinOrder=['first','biz','prem_eco','eco'];

  // 所有艙等費率
  var cabinRows=cabinOrder.map(function(c){
    if(!zd[c]) return '';
    var canAfford=data.myMiles>=zd[c];
    var diff=data.myMiles-zd[c];
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #21262d">'
      +'<span style="font-size:13px;min-width:20px">'+cabinIcons[c]+'</span>'
      +'<span style="font-size:12px;color:'+(canAfford?'#e6edf3':'#6e7681')+';flex:1">'+cabinLabels[c]+'</span>'
      +'<span style="font-size:12px;font-weight:600;color:'+(canAfford?'#4ade80':'#f87171')+'">'+zd[c].toLocaleString()+' 哩</span>'
      +(canAfford?'<span style="font-size:11px;color:#4b5563">剩 '+diff.toLocaleString()+'</span>':'<span style="font-size:11px;color:#f87171">差 '+(zd[c]-data.myMiles).toLocaleString()+'</span>')
    +'</div>';
  }).join('');

  // 航空資訊
  var directList=zd.airlines?zd.airlines.filter(function(a){return a.direct;}):[];
  var connectList=zd.airlines?zd.airlines.filter(function(a){return !a.direct;}):[];
  var airlinesHtml='';
  if(directList.length){
    airlinesHtml+='<div style="font-size:11px;font-weight:600;color:#4ade80;margin:8px 0 4px">✈️ 直飛航班</div>'
      +directList.map(function(a){
        var routes=a.routes?a.routes.filter(function(r){
          return r.indexOf(airportCode)>=0||r.indexOf('TPE')>=0;
        }).slice(0,3):[];
        return '<div style="font-size:12px;color:#c9d1d9;margin-bottom:3px"><b>'+a.code+'</b> '+a.name
          +(routes.length?' <span style="color:#6e7681">'+routes.join('、')+'</span>':'')+'</div>';
      }).join('');
  }
  if(connectList.length){
    airlinesHtml+='<div style="font-size:11px;font-weight:600;color:#6e7681;margin:8px 0 4px">🔀 轉機航班</div>'
      +connectList.slice(0,4).map(function(a){
        return '<div style="font-size:12px;color:#6e7681;margin-bottom:2px"><b>'+a.code+'</b> '+a.name+'</div>';
      }).join('');
  }
  if(zd.connections&&zd.connections.length){
    airlinesHtml+='<div style="font-size:11px;color:#9ca3af;margin-top:6px">'
      +zd.connections.map(function(c){return '• '+c.tip;}).join('<br>')+'</div>';
  }

  // 外站開票建議
  var offHtml='';
  if(prog.offorigin_tips&&prog.offorigin_tips.length){
    var matched=prog.offorigin_tips.filter(function(t){return t.apply_zones&&t.apply_zones.indexOf(zd.zone)>=0;});
    if(matched.length){
      offHtml='<div style="background:#1a1200;border:1px solid #92400e;border-radius:8px;padding:10px 12px;margin-top:10px">'
        +'<div style="font-size:11px;font-weight:600;color:#fbbf24;margin-bottom:6px">🌏 外站開票建議</div>'
        +matched.map(function(t){
          var bLabel={cheaper:'省哩程',upgrade:'升等機會',availability:'更易取位'}[t.benefit]||t.benefit;
          var bColor={cheaper:'#4ade80',upgrade:'#a5b4fc',availability:'#a8a29e'}[t.benefit]||'#9ca3af';
          return '<div style="border-top:1px solid #292100;padding-top:8px;margin-top:8px;first:border-top:none">'
            +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'
              +'<span style="font-size:11px;font-weight:600;color:#fcd34d">'+t.flag+' 定位至 '+t.via_name+'（'+t.via+'）</span>'
              +'<span style="font-size:10px;color:'+bColor+';border:1px solid;border-radius:8px;padding:1px 6px">'+bLabel+'</span>'
              +(t.miles_delta&&t.miles_delta<0?'<span style="font-size:11px;color:#4ade80">省 '+Math.abs(t.miles_delta/1000).toFixed(0)+',000 哩</span>':'')
            +'</div>'
            +'<div style="font-size:11px;color:#d97706;margin-bottom:4px">定位成本：'+t.positioning_est+'</div>'
            +'<div style="font-size:11px;color:#c9d1d9;line-height:1.6">'+t.tip+'</div>'
          +'</div>';
        }).join('')
      +'</div>';
    }
  }

  panel.innerHTML=''
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
      +'<span style="font-size:18px">'+cabinIcons[data.bestCabin]+'</span>'
      +'<div>'
        +'<div style="font-size:14px;font-weight:600;color:#e6edf3">'+(ap?ap.city:airportCode)+' ('+airportCode+')</div>'
        +'<div style="font-size:11px;color:#6e7681">'+(ap?ap.country+' · ':'')+zd.label+'</div>'
      +'</div>'
      +'<a href="'+prog.booking_url+'" target="_blank" rel="noopener" style="margin-left:auto;font-size:11px;background:#1d4ed8;color:#fff;border-radius:6px;padding:4px 12px;text-decoration:none">前往開票 →</a>'
    +'</div>'
    +'<div style="margin-bottom:10px">'+cabinRows+'</div>'
    +airlinesHtml
    +(zd.booking_tip?'<div style="font-size:11px;color:#9ca3af;background:#161b22;border-radius:6px;padding:8px 10px;margin-top:8px;line-height:1.6">💡 '+zd.booking_tip+'</div>':'')
    +offHtml;
}

// ── Tab3: 計畫總覽 ────────────────────────────────────────────────
function renderPrograms(){
  if(!CHARTS) return;
  var progIcons={asia_miles:'🐉',eva_mileage:'🟢',dynasty_flyer:'🔴',ana_mileage:'⭕',krisflyer:'🦁',starlux:'⭐',
    jal_mileage:'🔴',ba_avios:'🔵',flying_blue:'🌸',korean_skypass:'🔷',emirates_skywards:'✈️',
    united_mileageplus:'🟡',miles_more:'✈️',thai_rop:'🌺',turkish_miles:'🌙',malaysia_enrich:'🦁',qantas_ff:'🦘',
    qatar_privilege:'🟣',aeroplan:'🍁',etihad_guest:'💎',alaska_mileage:'🦅'};
  var progColors={asia_miles:'#dc7f27',eva_mileage:'#16a34a',dynasty_flyer:'#dc2626',ana_mileage:'#6366f1',krisflyer:'#f59e0b',starlux:'#0891b2',
    jal_mileage:'#dc2626',ba_avios:'#1d4ed8',flying_blue:'#7c3aed',korean_skypass:'#2563eb',emirates_skywards:'#c2410c',
    united_mileageplus:'#ca8a04',miles_more:'#1a3a6b',thai_rop:'#9333ea',turkish_miles:'#dc2626',malaysia_enrich:'#b91c1c',qantas_ff:'#ea580c',
    qatar_privilege:'#7c3aed',aeroplan:'#dc2626',etihad_guest:'#0891b2',alaska_mileage:'#0369a1'};
  var html='';
  Object.entries(CHARTS.programs).forEach(function(entry){
    var pid=entry[0], prog=entry[1];
    var spotsHtml=prog.sweet_spots.map(function(s){return '<div class="prog-spot">'+s+'</div>';}).join('');
    var partnersHtml=prog.transfer_partners.length
      ?'<div style="margin-top:10px;font-size:11px;color:#6e7681">可轉入：</div><div class="partners">'+prog.transfer_partners.map(function(p){return '<span class="partner-chip">'+p+'</span>';}).join('')+'</div>'
      :'<div style="margin-top:8px;font-size:11px;color:#6e7681">暫無台灣常見信用卡轉入合作</div>';

    html+='<div class="prog-card">'
      +'<div class="prog-card-header">'
        +'<div class="prog-icon" style="background:'+(progColors[pid]||'#374151')+'22;border:1px solid '+(progColors[pid]||'#374151')+'44">'+progIcons[pid]+'</div>'
        +'<div><div class="prog-name">'+prog.name+'</div><div class="prog-airline">'+prog.airline+' · '+prog.alliance+'</div></div>'
      +'</div>'
      +'<div style="font-size:11px;font-weight:600;color:#6e7681;margin-bottom:6px">精選兌換亮點</div>'
      +'<div class="prog-spots">'+spotsHtml+'</div>'
      +partnersHtml
    +'</div>';
  });
  document.getElementById('programs-grid').innerHTML=html;
}
</script>
</body>
</html>
